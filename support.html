<!DOCTYPE html>
<html>
<head>
    <title>Оператор - Чат поддержки</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .queue-panel {
            width: 300px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .chat-panel {
            flex: 1;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .queue-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .queue-header h3 {
            margin-bottom: 10px;
        }
        .support-info {
            background: #f0f4f8;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .support-info p {
            margin: 5px 0;
        }
        .status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
        .online {
            background: #4CAF50;
            color: white;
        }
        .offline {
            background: #f44336;
            color: white;
        }
        .accept-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .accept-btn:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        .accept-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .queue-stats {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .queue-stats p {
            margin: 5px 0;
        }
        .queue-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .chat-header {
            background: #4a5568;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header-info h3 {
            margin-bottom: 5px;
        }
        .chat-header-info p {
            font-size: 14px;
            opacity: 0.9;
        }
        .close-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .close-btn:hover {
            background: #d32f2f;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f7f7f7;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .my-message {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        .client-message {
            background: white;
            border: 1px solid #ddd;
            margin-right: auto;
        }
        .system-message {
            background: #ffd700;
            color: #333;
            text-align: center;
            font-size: 12px;
            max-width: 100%;
            margin: 5px 0;
            padding: 8px;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .typing-indicator {
            color: #999;
            font-style: italic;
            padding: 5px 15px;
            min-height: 25px;
        }
        .chat-input {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-right: 10px;
            font-size: 14px;
            transition: border 0.3s;
        }
        .chat-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .chat-input button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .chat-input button:hover {
            background: #5a67d8;
        }
        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .session-id {
            font-family: monospace;
            background: #2d3748;
            color: #a0aec0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<div class="container">
    <!-- Левая панель - очередь и информация оператора -->
    <div class="queue-panel">
        <div class="queue-header">
            <h3>👨‍💼 Панель оператора</h3>
        </div>

        <div class="support-info">
            <p><strong>Оператор:</strong> <span id="supportName">Анна</span></p>
            <p><strong>ID:</strong> <span id="supportId">support1</span></p>
            <p><strong>Session ID:</strong> <span id="sessionIdDisplay" class="session-id">не подключен</span></p>
            <p>
                <strong>Статус:</strong>
                <span id="supportStatus" class="status online">Свободен</span>
            </p>
        </div>

        <div class="queue-stats">
            <p><strong>📊 Статистика</strong></p>
            <p>В очереди: <span id="queueCount">0</span></p>
            <p>Активных чатов: <span id="activeChats">0</span></p>
        </div>

        <button id="acceptBtn" class="accept-btn">
            ✅ Принять следующий запрос
        </button>

        <div id="queueInfo">
            <div class="queue-item">
                <p><strong>Ожидание запросов...</strong></p>
            </div>
        </div>
    </div>

    <!-- Правая панель - чат с клиентом -->
    <div class="chat-panel">
        <div class="chat-header">
            <div class="chat-header-info">
                <h3 id="chatTitle">Ожидание клиента...</h3>
                <p id="clientInfo"></p>
            </div>
            <button class="close-btn" id="closeBtn" onclick="closeChat()">
                ❌ Закрыть чат
            </button>
        </div>

        <div class="chat-messages" id="messages"></div>
        <div class="typing-indicator" id="typing"></div>

        <div class="chat-input">
            <input type="text" id="messageInput"
                   placeholder="Введите сообщение..."
                   disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>
                Отправить
            </button>
        </div>
    </div>
</div>

<script>
    // Конфигурация оператора
    const SUPPORT_CONFIG = {
        'support1': { name: 'Анна', id: 'support1' },
        'support2': { name: 'Иван', id: 'support2' },
        'support3': { name: 'Мария', id: 'support3' }
    };

    // Выбираем оператора (можно менять для тестирования)
    const supportId = 'support1';  // support1, support2, support3
    const supportName = SUPPORT_CONFIG[supportId].name;

    document.getElementById('supportName').textContent = supportName;
    document.getElementById('supportId').textContent = supportId;

    // Переменные состояния
    let stompClient = null;
    let mySessionId = null;
    let currentTicketId = null;
    let currentClientId = null;
    let currentClientName = null;
    let typingTimer = null;
    let queueItems = [];

    // Инициализация подключения
    function connect() {
        console.log('🔌 Подключение к WebSocket...');

        const socket = new SockJS('http://localhost:8080/ws-support');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;  // Отключаем подробные логи

        stompClient.connect({}, function(frame) {
            console.log('✅ Подключено к серверу');

            // Получаем sessionId из URL
            mySessionId = socket._transport.url.split('/').pop();
            document.getElementById('sessionIdDisplay').textContent = mySessionId;

            console.log('🆔 Session ID:', mySessionId);

            // Подписываемся на персональный канал с нашим sessionId
            stompClient.subscribe('/queue/support', function(message) {
                const msg = JSON.parse(message.body);
                console.log('📨 Получено сообщение:', msg);
                handleIncomingMessage(msg);
            });

            // Подписываемся на индикатор печатания
            stompClient.subscribe('/queue/support/typing-user' + mySessionId, function(message) {
                const msg = JSON.parse(message.body);
                if (msg.text !== 'stop') {
                    showTypingIndicator(msg.fromUserName + ' печатает...');
                } else {
                    showTypingIndicator('');
                }
            });

            // Подписываемся на очередь (публичный канал)
            stompClient.subscribe('/topic/support/queue', function(message) {
                const msg = JSON.parse(message.body);
                updateQueueInfo(msg);
            });

        }, function(error) {
            console.error('❌ Ошибка подключения:', error);
            setTimeout(connect, 5000);  // Пробуем переподключиться через 5 секунд
        });
    }

    // Обработка входящих сообщений
    function handleIncomingMessage(msg) {
        displayMessage(msg);

        // Обновляем информацию о клиенте при подключении
        if (msg.type === 'TICKET_ACCEPTED') {
            currentClientId = msg.fromUserId;
            currentClientName = msg.fromUserName;
            document.getElementById('chatTitle').textContent =
                'Чат с клиентом: ' + currentClientName;
            document.getElementById('clientInfo').textContent =
                'ID: ' + currentClientId;
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            // Отправляем приветственное сообщение
            setTimeout(() => {
                addSystemMessage('👋 Чат начат. Чем могу помочь?');
            }, 1000);
        }

        // Обновляем статус при закрытии чата
        if (msg.type === 'TICKET_CLOSED') {
            currentTicketId = null;
            currentClientId = null;
            currentClientName = null;
            document.getElementById('chatTitle').textContent = 'Ожидание клиента...';
            document.getElementById('clientInfo').textContent = '';
            document.getElementById('messageInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;

            // Обновляем статус оператора
            updateSupportStatus(true);
        }
    }

    // Отображение сообщения в чате
    function displayMessage(msg) {
        const messagesDiv = document.getElementById('messages');
        const messageDiv = document.createElement('div');

        if (msg.type === 'TICKET_CREATED') {
            messageDiv.className = 'message system-message';
            messageDiv.innerHTML = `
                    <strong>🔔 Новое обращение</strong><br>
                    ${msg.text}<br>
                    <small class="message-time">${msg.timestamp || ''}</small>
                `;
            currentTicketId = msg.ticketId;
        }
        else if (msg.type === 'TICKET_ACCEPTED') {
            messageDiv.className = 'message system-message';
            messageDiv.innerHTML = `
                    <strong>✅ Чат начат</strong><br>
                    ${msg.text}<br>
                    <small class="message-time">${msg.timestamp || ''}</small>
                `;
            currentTicketId = msg.ticketId;
        }
        else if (msg.type === 'TICKET_CLOSED') {
            messageDiv.className = 'message system-message';
            messageDiv.innerHTML = `
                    <strong>🔒 Чат закрыт</strong><br>
                    ${msg.text}<br>
                    <small class="message-time">${msg.timestamp || ''}</small>
                `;
        }
        else if (msg.type === 'CHAT') {
            const isMyMessage = msg.fromUserId === supportId;
            messageDiv.className = 'message ' +
                (isMyMessage ? 'my-message' : 'client-message');
            messageDiv.innerHTML = `
                    <strong>${msg.fromUserName}:</strong> ${msg.text}<br>
                    <small class="message-time">${msg.timestamp || ''}</small>
                `;
        }

        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Добавление системного сообщения
    function addSystemMessage(text) {
        const messagesDiv = document.getElementById('messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message system-message';
        messageDiv.innerHTML = `
                <strong>🤖 Система:</strong> ${text}<br>
                <small class="message-time">${new Date().toLocaleTimeString()}</small>
            `;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Обновление информации об очереди
    function updateQueueInfo(msg) {
        const queueDiv = document.getElementById('queueInfo');

        if (msg.type === 'TICKET_CREATED') {
            queueItems.push(msg);
            document.getElementById('queueCount').textContent = queueItems.length;

            queueDiv.innerHTML = queueItems.map(item => `
                    <div class="queue-item">
                        <strong>🔔 Новый запрос</strong><br>
                        ${item.text}<br>
                        <small>${item.timestamp || ''}</small>
                    </div>
                `).join('');
        }
    }

    // Принять следующий запрос
    document.getElementById('acceptBtn').onclick = function() {
        console.log('📞 Принимаем следующий запрос...');

        stompClient.send("/app/support.accept", {}, JSON.stringify({
            fromUserId: supportId,
            fromUserName: supportName
        }));

        updateSupportStatus(false);
        this.disabled = true;

        // Очищаем очередь
        queueItems = [];
        document.getElementById('queueCount').textContent = '0';
        document.getElementById('queueInfo').innerHTML = `
                <div class="queue-item">
                    <p><strong>Ожидание запросов...</strong></p>
                </div>
            `;
    };

    // Отправка сообщения
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();

        if (text && stompClient && currentTicketId && currentClientId) {
            const message = {
                ticketId: currentTicketId,
                fromUserId: supportId,
                fromUserName: supportName,
                toUserId: currentClientId,
                text: text
            };

            console.log('📤 Отправка сообщения:', message);

            stompClient.send("/app/support.chat", {}, JSON.stringify(message));

            // Отображаем свое сообщение сразу
            const msg = {
                ...message,
                type: 'CHAT',
                timestamp: new Date().toLocaleTimeString()
            };
            displayMessage(msg);

            input.value = '';
        }
    }

    // Индикатор печатания
    document.getElementById('messageInput').onkeypress = function(e) {
        if (e.key === 'Enter') {
            sendMessage();
            return;
        }

        if (stompClient && currentTicketId) {
            stompClient.send("/app/support.typing", {}, JSON.stringify({
                ticketId: currentTicketId,
                fromUserId: supportId,
                fromUserName: supportName
            }));

            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                stompClient.send("/app/support.typing", {}, JSON.stringify({
                    ticketId: currentTicketId,
                    fromUserId: supportId,
                    fromUserName: supportName,
                    text: 'stop'
                }));
            }, 1000);
        }
    };

    // Закрытие чата
    function closeChat() {
        if (stompClient && currentTicketId) {
            console.log('🔒 Закрытие чата:', currentTicketId);

            stompClient.send("/app/support.close", {}, JSON.stringify({
                ticketId: currentTicketId,
                fromUserId: supportId
            }));

            updateSupportStatus(true);
            document.getElementById('acceptBtn').disabled = false;
        }
    }

    // Обновление статуса оператора
    function updateSupportStatus(available) {
        const statusDiv = document.getElementById('supportStatus');
        if (available) {
            statusDiv.className = 'status online';
            statusDiv.textContent = 'Свободен';
            document.getElementById('acceptBtn').disabled = false;
        } else {
            statusDiv.className = 'status offline';
            statusDiv.textContent = 'Занят';
        }
    }

    // Показать индикатор печатания
    function showTypingIndicator(text) {
        document.getElementById('typing').textContent = text;
    }

    // Обработка закрытия страницы
    window.onbeforeunload = function() {
        if (stompClient && currentTicketId) {
            stompClient.send("/app/support.close", {}, JSON.stringify({
                ticketId: currentTicketId,
                fromUserId: supportId
            }));
        }
        if (stompClient) {
            stompClient.disconnect();
        }
    };

    // Запуск подключения при загрузке страницы
    window.onload = connect;
</script>
</body>
</html>
