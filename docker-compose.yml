version: '3.8'

services:
  hello-world-app:
    build: .
    container_name: spring-hello-world
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8080
    restart: unless-stopped
    # Для просмотра логов
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"