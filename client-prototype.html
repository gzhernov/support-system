<!DOCTYPE html>
<html>
<head>
    <title>Прототип - Клиент поддержки</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            padding: 20px;
        }

        /* Главный контейнер */
        .app-container {
            max-width: 1400px;
            height: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Шапка */
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .client-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .client-badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Основной контент - две колонки */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Левая колонка - лента обращений */
        .tickets-sidebar {
            width: 380px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ticket-count {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }

        .new-ticket-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .new-ticket-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Список обращений */
        .tickets-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .ticket-item {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ticket-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .ticket-item.active {
            border-left: 4px solid #667eea;
            background: #ebf4ff;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .ticket-status {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-open { background: #fef3c7; color: #92400e; }
        .status-in-progress { background: #dbeafe; color: #1e40af; }
        .status-closed { background: #e5e7eb; color: #4b5563; }

        .ticket-right-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ticket-operator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #667eea;
            background: #f0f4ff;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .ticket-operator span {
            color: #4a5568;
        }

        .no-operator-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px dashed #f59e0b;
        }

        /* Новый горизонтальный индикатор */
        .unread-indicator {
            display: inline-flex;
            align-items: center;
            background: #f44336;
            color: white;
            border-radius: 16px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            gap: 4px;
            margin-left: 4px;
        }

        .unread-indicator::before {
            content: "💬";
            font-size: 10px;
            opacity: 0.9;
        }

        .ticket-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ticket-preview {
            font-size: 12px;
            color: #718096;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ticket-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a0aec0;
        }

        /* Правая колонка - чат */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #a0aec0;
            padding: 40px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #4a5568;
        }

        .chat-header {
            background: #4a5568;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info h3 {
            font-size: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .operator-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .operator-avatar {
            width: 20px;
            height: 20px;
            background: #ffd700;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #4a5568;
            font-weight: bold;
        }

        .waiting-operator {
            color: #f59e0b;
            font-style: italic;
        }

        .assigning-dots {
            display: inline-flex;
            gap: 3px;
            margin-left: 5px;
        }

        .assigning-dots span {
            width: 4px;
            height: 4px;
            background: #92400e;
            border-radius: 50%;
            animation: dotPulse 1.5s infinite;
        }

        .assigning-dots span:nth-child(2) { animation-delay: 0.2s; }
        .assigning-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        .chat-header-info p {
            font-size: 13px;
            opacity: 0.8;
        }

        .chat-status {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-waiting { background: #f59e0b; color: white; }
        .status-active { background: #10b981; color: white; }
        .status-closed { background: #6b7280; color: white; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #f7fafc;
        }

        .message {
            margin-bottom: 20px;
            max-width: 70%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-client {
            margin-left: auto;
        }

        .message-support {
            margin-right: auto;
        }

        .message-system {
            margin: 10px auto;
            max-width: 90%;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message-client .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-support .message-bubble {
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message-system .message-bubble {
            background: #f0f4ff;
            border-left: 3px solid #667eea;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            color: #4a5568;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .message-sender {
            font-size: 12px;
            font-weight: bold;
        }

        .message-client .message-sender {
            color: #667eea;
        }

        .message-support .message-sender {
            color: #10b981;
        }

        .message-system .message-sender {
            color: #667eea;
        }

        .message-operator-name {
            font-size: 11px;
            color: #718096;
            background: #f0f4ff;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        .typing-indicator {
            color: #718096;
            font-style: italic;
            padding: 10px 25px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .typing-operator {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            color: #4a5568;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 2px solid #e2e8f0;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            margin-right: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .chat-input input:disabled {
            background: #f7f7f7;
            cursor: not-allowed;
        }

        .chat-input button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chat-input button:hover:not(:disabled) {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .chat-input button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Модальное окно нового обращения */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 500px;
            max-width: 90%;
            padding: 30px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #2d3748;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-content textarea {
            height: 120px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-actions button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-cancel {
            background: #e5e7eb;
            color: #4b5563;
        }

        .btn-cancel:hover {
            background: #d1d5db;
        }

        .btn-submit {
            background: #667eea;
            color: white;
        }

        .btn-submit:hover {
            background: #5a67d8;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1001;
            animation: slideRight 0.3s ease;
        }

        @keyframes slideRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.show {
            display: flex;
        }

        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #f44336; }
        .toast.info { border-left: 4px solid #667eea; }

        /* Адаптивность */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .tickets-sidebar {
                width: 100%;
                height: 300px;
            }
        }

        /* Системное сообщение об операторе */
        .system-message-operator {
            background: #f0f4ff;
            border-left: 3px solid #667eea;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .system-message-operator .icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Шапка -->
    <div class="app-header">
        <h1>
            <span>📞 Поддержка</span>
            <span style="font-size: 14px; opacity: 0.8;">(прототип)</span>
        </h1>
        <div class="client-info">
            <div class="client-badge">
                <span>👤 Клиент: <strong id="clientName">Загрузка...</strong></span>
            </div>
            <div class="client-badge">
                <span>🆔 ID: <strong id="clientId">Загрузка...</strong></span>
            </div>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
        <!-- Левая колонка - обращения -->
        <div class="tickets-sidebar">
            <div class="sidebar-header">
                <h2>
                    <span>📋 Мои обращения</span>
                    <span class="ticket-count" id="ticketCount">0</span>
                </h2>
                <button class="new-ticket-btn" onclick="openNewTicketModal()">
                    <span>➕</span> Новое обращение
                </button>
            </div>

            <div class="tickets-list" id="ticketsList">
                <!-- JS будет заполнять -->
            </div>
        </div>

        <!-- Правая колонка - чат -->
        <div class="chat-area" id="chatArea">
            <!-- Пустое состояние -->
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">💬</div>
                <h3>Выберите обращение</h3>
                <p>Кликните на обращение в списке слева,<br>чтобы открыть чат</p>
                <button class="new-ticket-btn" style="width: auto; margin-top: 20px;" onclick="openNewTicketModal()">
                    ➕ Создать новое обращение
                </button>
            </div>

            <!-- Активный чат (скрыт по умолчанию) -->
            <div style="display: none; height: 100%; flex-direction: column;" id="activeChat">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <h3>
                            <span id="activeTicketTitle">Проблема с доступом</span>
                            <span class="operator-badge" id="operatorBadge">
                                    <span class="operator-avatar" id="operatorAvatar">А</span>
                                    <span id="operatorName">Анна</span>
                                </span>
                        </h3>
                        <p id="activeTicketId">#TKT-2024-001</p>
                    </div>
                    <div>
                        <span class="chat-status" id="activeTicketStatus">В работе</span>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="typing-indicator" id="typingIndicator">
                    <span class="typing-operator" id="typingOperator"></span>
                    <span id="typingText"></span>
                </div>

                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
                    <button id="sendButton" disabled>Отправить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно нового обращения -->
<div class="modal" id="newTicketModal">
    <div class="modal-content">
        <h2>📝 Новое обращение</h2>

        <select id="ticketCategory">
            <option value="">Выберите категорию</option>
            <option value="technical">🔧 Техническая проблема</option>
            <option value="billing">💰 Оплата и счета</option>
            <option value="account">👤 Управление аккаунтом</option>
            <option value="other">❓ Другое</option>
        </select>

        <input type="text" id="ticketTitle" placeholder="Краткое описание (заголовок)">

        <textarea id="ticketDescription" placeholder="Подробное описание проблемы..."></textarea>

        <select id="ticketPriority">
            <option value="low">🟢 Низкий приоритет</option>
            <option value="medium" selected>🟡 Средний приоритет</option>
            <option value="high">🔴 Высокий приоритет</option>
        </select>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeNewTicketModal()">Отмена</button>
            <button class="btn-submit" onclick="createNewTicket()">Создать</button>
        </div>
    </div>
</div>

<!-- Уведомления -->
<div class="toast" id="toast">
    <span id="toastMessage">Уведомление</span>
</div>

<script>
    // ========== ДАННЫЕ ДЛЯ ПРОТОТИПА ==========
    const clientData = {
        id: 'CLT-' + Math.floor(Math.random() * 1000),

    };

    // База операторов
    const operators = {
        'anna': { name: 'Анна', avatar: 'А', color: '#ffd700' },

        'maria': { name: 'Мария', avatar: 'М', color: '#ffb6c1' },

    let tickets = [
        {

            category: 'technical',

                {

                {

                {
                    id: 5,

                }
            ]
        },
        {
            id: 'TKT-2024-002',
            title: 'Вопрос по оплате тарифа',

            priority: 'medium',
            status: 'waiting',
            operator: 'ivan',
            operatorName: 'Иван',
            createdAt: '2024-02-26T14:20:00',

            unread: 0,
            messages: [
                {
                    id: 1,
                    sender: 'client',
                    text: 'Добрый день! Вопрос по оплате корпоративного тарифа.',
                    time: '14:20'
                }
            ]
        },
        {
            id: 'TKT-2024-003',
            title: 'Предложение по улучшению сервиса',
            description: 'Хотел бы предложить добавить темную тему в интерфейс. Многие пользователи просят эту функцию.',
            category: 'other',
            priority: 'low',
            status: 'open',
            operator: null,
            operatorName: null,
            createdAt: '2024-02-27T09:00:00',
            updatedAt: '2024-02-27T09:00:00',
            unread: 1,
            messages: [
                {
                    id: 1,
                    sender: 'client',
                    text: 'Предлагаю добавить темную тему в интерфейс.',
                    time: '09:00'
                }
            ]
        }
    ];

    let currentTicketId = null;

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    document.addEventListener('DOMContentLoaded', function() {
        const clientNameEl = document.getElementById('clientName');
        const clientIdEl = document.getElementById('clientId');

        if (clientNameEl) {
            clientNameEl.textContent = clientData.name;
        } else {
            console.error('Элемент с id="clientName" не найден');
        }

        if (clientIdEl) {
            clientIdEl.textContent = clientData.id;
        } else {
            console.error('Элемент с id="clientId" не найден');
        }

        // Инициализация
        renderTicketsList();

        // Скрываем индикатор печатания по умолчанию
        const typingIndicator = document.getElementById('typingIndicator');
        if (typingIndicator) {
            typingIndicator.style.display = 'none';
        }
    });

    // Отрисовка списка обращений
    function renderTicketsList() {
        const container = document.getElementById('ticketsList');
        if (!container) {
            console.error('Элемент ticketsList не найден');
            return;
        }

        container.innerHTML = '';

        tickets.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

        tickets.forEach(ticket => {
            const ticketEl = document.createElement('div');
            ticketEl.className = `ticket-item ${ticket.id === currentTicketId ? 'active' : ''}`;
            ticketEl.onclick = () => openTicket(ticket.id);

            const statusClass =
                ticket.status === 'open' ? 'status-open' :
                    ticket.status === 'waiting' ? 'status-open' :
                        ticket.status === 'in-progress' ? 'status-in-progress' :
                            'status-closed';

            const statusText =
                ticket.status === 'open' ? 'Ожидает оператора' :
                    ticket.status === 'waiting' ? 'Ожидает ответа' :
                        ticket.status === 'in-progress' ? 'В работе' :
                            'Закрыто';

            const priorityEmoji =
                ticket.priority === 'high' ? '🔴' :
                    ticket.priority === 'medium' ? '🟡' : '🟢';

            const date = new Date(ticket.updatedAt).toLocaleString('ru', {
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });

            // Формируем блок оператора
            let operatorHtml = '';
            if (ticket.operator) {
                const operator = operators[ticket.operator];
                operatorHtml = `
                        <div class="ticket-operator">
                            <span class="operator-avatar" style="background: ${operator.color}">${operator.avatar}</span>
                            <span>${ticket.operatorName}</span>
                        </div>
                    `;
            } else {
                operatorHtml = `
                        <div class="no-operator-badge">
                            <span>⏳</span>
                            <span>Ожидание оператора</span>
                        </div>
                    `;
            }

            // Индикатор новых сообщений (горизонтальный)
            const unreadHtml = ticket.unread > 0
                ? `<span class="unread-indicator">${ticket.unread}</span>`
                : '';

            ticketEl.innerHTML = `
                    <div class="ticket-header">
                        <span class="ticket-status ${statusClass}">${priorityEmoji} ${statusText}</span>
                        <div class="ticket-right-info">
                            ${operatorHtml}
                            ${unreadHtml}
                        </div>
                    </div>
                    <div class="ticket-title">
                        ${ticket.title}
                    </div>
                    <div class="ticket-preview">${ticket.description.substring(0, 60)}...</div>
                    <div class="ticket-meta">
                        <span>#${ticket.id}</span>
                        <span>${date}</span>
                    </div>
                `;

            container.appendChild(ticketEl);
        });

        const ticketCountEl = document.getElementById('ticketCount');
        if (ticketCountEl) {
            ticketCountEl.textContent = tickets.length;
        }
    }

    // Открыть обращение
    function openTicket(ticketId) {
        const ticket = tickets.find(t => t.id === ticketId);
        if (!ticket) return;

        currentTicketId = ticketId;

        // Сбрасываем счетчик непрочитанных
        ticket.unread = 0;

        // Обновляем список
        renderTicketsList();

        // Показываем чат, скрываем пустое состояние
        const emptyState = document.getElementById('emptyState');
        const activeChat = document.getElementById('activeChat');

        if (emptyState) emptyState.style.display = 'none';
        if (activeChat) activeChat.style.display = 'flex';

        // Заполняем информацию о тикете
        const activeTicketTitle = document.getElementById('activeTicketTitle');
        const activeTicketId = document.getElementById('activeTicketId');
        const operatorBadge = document.getElementById('operatorBadge');
        const operatorAvatar = document.getElementById('operatorAvatar');
        const operatorName = document.getElementById('operatorName');
        const activeTicketStatus = document.getElementById('activeTicketStatus');

        if (activeTicketTitle) activeTicketTitle.textContent = ticket.title;
        if (activeTicketId) activeTicketId.textContent = `#${ticket.id}`;

        // Информация об операторе
        if (ticket.operator && operatorBadge && operatorAvatar && operatorName) {
            const operator = operators[ticket.operator];
            operatorBadge.style.display = 'inline-flex';
            operatorName.innerHTML = ticket.operatorName; // Сбрасываем HTML
            operatorAvatar.textContent = operator.avatar;
            operatorAvatar.style.background = operator.color;
            operatorAvatar.style.color = '#4a5568';
        } else if (operatorBadge && operatorAvatar && operatorName) {
            // Оператор не назначен - показываем специальный индикатор
            operatorBadge.style.display = 'inline-flex';
            operatorName.innerHTML = `
                    <span class="waiting-operator">Ожидание оператора</span>
                    <span class="assigning-dots">
                        <span></span><span></span><span></span>
                    </span>
                `;
            operatorAvatar.textContent = '⏳';
            operatorAvatar.style.background = '#fef3c7';
            operatorAvatar.style.color = '#92400e';
        }

        if (activeTicketStatus) {
            activeTicketStatus.textContent =
                ticket.status === 'open' ? 'Ожидает оператора' :
                    ticket.status === 'waiting' ? 'Ожидает ответа' :
                        ticket.status === 'in-progress' ? 'В работе' : 'Закрыто';
            activeTicketStatus.className = `chat-status ${
                ticket.status === 'open' ? 'status-waiting' :
                    ticket.status === 'waiting' ? 'status-waiting' :
                        ticket.status === 'in-progress' ? 'status-active' : 'status-closed'
            }`;
        }

        // Включаем/выключаем поле ввода в зависимости от наличия оператора
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        if (messageInput && sendButton) {
            if (ticket.operator) {
                messageInput.disabled = false;
                sendButton.disabled = false;
            } else {
                messageInput.disabled = true;
                sendButton.disabled = true;
            }
        }

        // Отрисовываем сообщения
        renderMessages(ticket.messages, ticket.operator);
    }

    // Отрисовка сообщений
    function renderMessages(messages, currentOperator = null) {
        const container = document.getElementById('chatMessages');
        if (!container) return;

        container.innerHTML = '';

        // Добавляем системное сообщение, если оператор не назначен
        if (!currentOperator) {
            const systemMsgEl = document.createElement('div');
            systemMsgEl.className = 'message message-system';
            systemMsgEl.innerHTML = `
                    <div class="message-bubble">
                        <span class="icon">⏳</span>
                        <strong>Ожидание оператора</strong><br>
                        Ваше обращение принято. Оператор подключится в ближайшее время.
                    </div>
                `;
            container.appendChild(systemMsgEl);
        }

        messages.forEach(msg => {
            const msgEl = document.createElement('div');

            if (msg.sender === 'system') {
                msgEl.className = 'message message-system';
                msgEl.innerHTML = `
                        <div class="message-bubble">
                            ${msg.text}
                        </div>
                    `;
            } else {
                msgEl.className = `message message-${msg.sender}`;

                let headerHtml = '';
                if (msg.sender === 'support' && msg.operator) {
                    const operator = operators[msg.operator] || { name: 'Оператор', avatar: 'О', color: '#cccccc' };
                    headerHtml = `
                            <div class="message-header">
                                <span class="message-sender">Оператор</span>
                                <span class="message-operator-name">
                                    <span class="operator-avatar" style="background: ${operator.color}; width: 16px; height: 16px; font-size: 10px; display: inline-flex; margin-right: 4px;">
                                        ${operator.avatar}
                                    </span>
                                    ${operator.name}
                                </span>
                            </div>
                        `;
                } else if (msg.sender === 'support' && !msg.operator) {
                    headerHtml = `
                            <div class="message-header">
                                <span class="message-sender">Система</span>
                            </div>
                        `;
                } else {
                    headerHtml = `
                            <div class="message-header">
                                <span class="message-sender">${msg.sender === 'client' ? 'Вы' : 'Оператор'}</span>
                            </div>
                        `;
                }

                msgEl.innerHTML = `
                        ${headerHtml}
                        <div class="message-bubble">${msg.text}</div>
                        <div class="message-time">${msg.time}</div>
                    `;
            }

            container.appendChild(msgEl);
        });

        container.scrollTop = container.scrollHeight;
    }

    // Открыть модальное окно нового обращения
    function openNewTicketModal() {
        const modal = document.getElementById('newTicketModal');
        if (modal) {
            modal.classList.add('active');
        }
    }

    // Закрыть модальное окно
    function closeNewTicketModal() {
        const modal = document.getElementById('newTicketModal');
        if (modal) {
            modal.classList.remove('active');
        }

        // Очищаем форму
        const category = document.getElementById('ticketCategory');
        const title = document.getElementById('ticketTitle');
        const description = document.getElementById('ticketDescription');
        const priority = document.getElementById('ticketPriority');

        if (category) category.value = '';
        if (title) title.value = '';
        if (description) description.value = '';
        if (priority) priority.value = 'medium';
    }

    // Создать новое обращение
    function createNewTicket() {
        const category = document.getElementById('ticketCategory');
        const title = document.getElementById('ticketTitle');
        const description = document.getElementById('ticketDescription');
        const priority = document.getElementById('ticketPriority');

        if (!category || !title || !description || !priority) {
            showToast('Ошибка получения данных формы', 'error');
            return;
        }

        const categoryValue = category.value;
        const titleValue = title.value.trim();
        const descriptionValue = description.value.trim();
        const priorityValue = priority.value;

        if (!categoryValue || !titleValue || !descriptionValue) {
            showToast('Заполните все поля!', 'error');
            return;
        }

        // Новое обращение создается БЕЗ оператора
        const newTicket = {
            id: 'TKT-' + Math.floor(Math.random() * 1000),
            title: titleValue,
            description: descriptionValue,
            category: categoryValue,
            priority: priorityValue,
            status: 'open',
            operator: null,
            operatorName: null,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            unread: 0,
            messages: [
                {
                    id: 1,
                    sender: 'client',
                    text: descriptionValue,
                    time: new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
                }
            ]
        };

        tickets.unshift(newTicket);
        renderTicketsList();
        closeNewTicketModal();

        showToast('Обращение создано! Оператор скоро подключится', 'success');

        // Открываем созданное обращение
        openTicket(newTicket.id);

        // Имитация назначения оператора через 5 секунд (для демонстрации)
        setTimeout(() => {
            simulateOperatorAssignment(newTicket.id);
        }, 5000);
    }

    // Имитация назначения оператора (для демо)
    function simulateOperatorAssignment(ticketId) {
        const ticket = tickets.find(t => t.id === ticketId);
        if (!ticket || ticket.operator) return;

        // Назначаем случайного оператора
        const operatorKeys = Object.keys(operators);
        const randomOperator = operatorKeys[Math.floor(Math.random() * operatorKeys.length)];

        ticket.operator = randomOperator;
        ticket.operatorName = operators[randomOperator].name;
        ticket.status = 'in-progress';

        // Добавляем системное сообщение о подключении оператора
        ticket.messages.push({
            id: ticket.messages.length + 1,
            sender: 'system',
            text: `✅ Оператор ${operators[randomOperator].name} подключился к чату`,
            time: new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
        });

        // Если это текущий открытый тикет - обновляем отображение
        if (currentTicketId === ticketId) {
            openTicket(ticketId);
        }

        // Обновляем список обращений
        renderTicketsList();

        showToast(`Оператор ${operators[randomOperator].name} подключился к чату`, 'success');
    }

    // Показать уведомление
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        if (!toast || !toastMessage) return;

        toastMessage.textContent = message;
        toast.className = `toast show ${type}`;

        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // Отправка сообщения
    const sendButton = document.getElementById('sendButton');
    if (sendButton) {
        sendButton.onclick = function() {
            const input = document.getElementById('messageInput');
            if (!input) return;

            const text = input.value.trim();

            if (!text || !currentTicketId) return;

            const ticket = tickets.find(t => t.id === currentTicketId);
            if (!ticket) return;

            // Добавляем сообщение клиента
            ticket.messages.push({
                id: ticket.messages.length + 1,
                sender: 'client',
                text: text,
                time: new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
            });

            ticket.updatedAt = new Date().toISOString();

            // Обновляем чат
            renderMessages(ticket.messages, ticket.operator);

            // Очищаем поле
            input.value = '';

            // Если оператор есть - имитируем ответ
            if (ticket.operator) {
                // Показываем индикатор печатания
                const typingIndicator = document.getElementById('typingIndicator');
                const typingOperator = document.getElementById('typingOperator');
                const typingText = document.getElementById('typingText');

                if (typingIndicator) typingIndicator.style.display = 'flex';
                if (typingOperator) typingOperator.textContent = operators[ticket.operator].name;
                if (typingText) typingText.textContent = 'печатает...';

                setTimeout(() => {
                    // Добавляем ответ оператора
                    ticket.messages.push({
                        id: ticket.messages.length + 1,
                        sender: 'support',
                        operator: ticket.operator,
                        text: getAutoResponse(text),
                        time: new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
                    });

                    renderMessages(ticket.messages, ticket.operator);

                    // Убираем индикатор
                    if (typingIndicator) typingIndicator.style.display = 'none';
                }, 2000);
            }
        };
    }

    // Автоответы для демонстрации
    function getAutoResponse(message) {
        const responses = [
            "Спасибо за сообщение! Я проверяю эту информацию.",
            "Понял вашу проблему. Сейчас разберемся.",
            "Отличный вопрос! Давайте уточним детали.",
            "Принято. Я уже работаю над этим.",
            "Спасибо, что сообщили. Это очень важно."
        ];
        return responses[Math.floor(Math.random() * responses.length)];
    }

    // Enter для отправки
    const messageInput = document.getElementById('messageInput');
    if (messageInput) {
        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                const sendButton = document.getElementById('sendButton');
                if (sendButton && !sendButton.disabled) {
                    sendButton.click();
                }
            }
        };
    }
</script>
</body>
</html>
