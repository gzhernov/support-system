<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Time</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <h1>Текущее время: <span id="time">--:--:--</span></h1>
    
    <script>
        const socket = new SockJS('http://localhost:8080/ws-time');
        const stompClient = Stomp.over(socket);
        
        stompClient.connect({}, function(frame) {
            console.log('Подключено: ' + frame);
            
            stompClient.subscribe('/topic/time', function(message) {
                document.getElementById('time').textContent = message.body;
            });
        });
    </script>
</body>
</html>
